syntax = "proto3";

package qcstream;

option csharp_namespace = "QcStream.Proto";
option java_package = "com.qcstream";

// ─────────────────────────────────────────────
// Enumerations
// ─────────────────────────────────────────────

enum PixelFormat {
  PIXEL_FORMAT_UNSPECIFIED = 0;
  UINT8 = 1;
  UINT16 = 2;
  FLOAT32 = 3;
}

enum MarkerType {
  MARKER_UNSPECIFIED = 0;
  BASELINE_START = 1;
  BASELINE_END = 2;
  DRUG_ON = 3;
  DRUG_OFF = 4;
  STIM_ON = 5;
  STIM_OFF = 6;
  NOTE = 7;
}

enum QCState {
  QC_STATE_UNSPECIFIED = 0;
  GREEN = 1;
  YELLOW = 2;
  RED = 3;
}

enum FindingType {
  FINDING_UNSPECIFIED = 0;
  FLOW_DELAY = 1;
  BASELINE_DRIFT = 2;
  MOTION = 3;
  BLEACH = 4;
  SATURATION = 5;
  FOCUS_DRIFT = 6;
  MARKER_MISSING = 7;
}

// ─────────────────────────────────────────────
// Nested types
// ─────────────────────────────────────────────

message Channel {
  uint32 channel_id = 1;
  string name = 2;
  float wavelength = 3;
  uint32 bit_depth = 4;
}

message EvidenceRef {
  uint64 frame_start = 1;
  uint64 frame_end = 2;
  repeated string metric_trace_ids = 3;
}

message Finding {
  FindingType type = 1;
  float confidence = 2;
  string summary = 3;
  EvidenceRef evidence = 4;
}

// ─────────────────────────────────────────────
// Top-level messages
// ─────────────────────────────────────────────

message SessionManifest {
  string session_id = 1;
  string lab_id = 2;
  string rig_id = 3;
  string modality = 4;
  uint32 width = 5;
  uint32 height = 6;
  float fps = 7;
  repeated Channel channels = 8;
  map<string, string> acquisition_meta = 9;
  map<string, string> plan_meta = 10;
  string edge_agent_version = 11;
  string adapter_name = 12;
  string adapter_version = 13;
  string manifest_sha256 = 14;
}

message FrameBatch {
  string session_id = 1;
  uint64 batch_index = 2;
  uint64 first_frame_index = 3;
  uint32 frame_count = 4;
  int64 t0_mono_ns = 5;
  int64 dt_ns = 6;
  repeated int64 frame_timestamps_ns = 7;
  uint32 channel_id = 8;
  bytes payload = 9;
  PixelFormat pixel_format = 10;
  uint32 width = 11;
  uint32 height = 12;
  map<string, string> batch_meta = 13;
}

message MarkerEvent {
  string session_id = 1;
  int64 t_mono_ns = 2;
  MarkerType type = 3;
  string value = 4;
  map<string, string> meta = 5;
}

message QCStatus {
  string session_id = 1;
  int64 t_eval_mono_ns = 2;
  QCState state = 3;
  float risk_score = 4;
  repeated Finding top_findings = 5;
}

message IngestResponse {
  bool accepted = 1;
  string message = 2;
}

// ─────────────────────────────────────────────
// Services
// ─────────────────────────────────────────────

service QcIngestService {
  rpc SendSessionManifest(SessionManifest) returns (IngestResponse);
  rpc SendFrameBatches(stream FrameBatch) returns (IngestResponse);
  rpc SendMarkerEvent(MarkerEvent) returns (IngestResponse);
  rpc StreamFramesAndMarkers(stream FrameBatch) returns (stream QCStatus);
}
